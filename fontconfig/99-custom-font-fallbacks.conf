<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Fallbacks for templates that use commercial Windows/macOS fonts
       which are not available on the Linux server. Exact rendering still
       requires uploading the real .ttf/.otf files into the fonts/ folder. -->

  <alias>
    <family>Circe</family>
    <prefer>
      <family>Montserrat</family>
      <family>Open Sans</family>
      <family>Noto Sans</family>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Circe Bold</family>
    <prefer>
      <family>Montserrat</family>
      <family>Open Sans</family>
      <family>Noto Sans</family>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Arimo</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Times New Roman</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>Tinos</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <alias>
    <family>Calibri</family>
    <prefer>
      <family>Carlito</family>
      <family>Noto Sans</family>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Cambria</family>
    <prefer>
      <family>Caladea</family>
      <family>Noto Serif</family>
      <family>Liberation Serif</family>
    </prefer>
  </alias>
</fontconfig>


