<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test name="family"><string>Circe</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Circe Bold</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Circe Extra Bold</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Circe Light</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Circe Extra Light</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Circe Thin</string></test>
    <edit name="family" mode="assign"><string>PT Sans</string></edit>
  </match>
</fontconfig>
